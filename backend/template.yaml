AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Plot Palette - Synthetic Data Generation Platform API

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT authorization
  CognitoClientId:
    Type: String
    Description: Cognito App Client ID
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: 'https://plot-palette.example.com'
    Description: Comma-separated list of allowed CORS origins (no wildcards in production)
  EcsClusterName:
    Type: String
    Default: ""
    Description: ECS Cluster name for worker tasks (optional)
  TaskDefinitionArn:
    Type: String
    Default: ""
    Description: ECS Task Definition ARN (optional)
  SubnetIds:
    Type: String
    Default: ""
    Description: Comma-separated subnet IDs for ECS tasks (optional)
  SecurityGroupId:
    Type: String
    Default: ""
    Description: Security Group ID for ECS tasks (optional)
  StateMachineArn:
    Type: String
    Default: ""
    Description: Step Functions state machine ARN for job lifecycle (optional)
  SenderEmail:
    Type: String
    Default: "noreply@plotpalette.example.com"
    Description: Verified SES sender email address for notifications

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.13
    Architectures:
      - x86_64
    Environment:
      Variables:
        JOBS_TABLE_NAME: !Ref JobsTable
        QUEUE_TABLE_NAME: !Ref QueueTable
        TEMPLATES_TABLE_NAME: !Ref TemplatesTable
        COST_TRACKING_TABLE_NAME: !Ref CostTrackingTable
        BUCKET_NAME: !Ref DataBucket
        ECS_CLUSTER_NAME: !Ref EcsClusterName
        TASK_DEFINITION_ARN: !Ref TaskDefinitionArn
        SUBNET_IDS: !Ref SubnetIds
        SECURITY_GROUP_ID: !Ref SecurityGroupId
        STATE_MACHINE_ARN: !Ref StateMachineArn
        NOTIFICATION_PREFERENCES_TABLE_NAME: !Ref NotificationPreferencesTable
        BATCHES_TABLE_NAME: !Ref BatchesTable
        SENDER_EMAIL: !Ref SenderEmail
        ALLOWED_ORIGIN: !Select [0, !Ref AllowedOrigins]
    LoggingConfig:
      LogGroup: !Ref LambdaLogGroup
      LogFormat: JSON

Resources:
  # ============================================================
  # CloudWatch Logs
  # ============================================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/plot-palette-${Environment}
      RetentionInDays: 30

  # ============================================================
  # DynamoDB Tables
  # ============================================================
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub plot-palette-Jobs-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      GlobalSecondaryIndexes:
        - IndexName: user-id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  QueueTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub plot-palette-Queue-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: status
          AttributeType: S
        - AttributeName: job_id_timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: status
          KeyType: HASH
        - AttributeName: job_id_timestamp
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  TemplatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub plot-palette-Templates-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: template_id
          AttributeType: S
        - AttributeName: version
          AttributeType: N
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: template_id
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      GlobalSecondaryIndexes:
        - IndexName: user-id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CostTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub plot-palette-CostTracking-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  NotificationPreferencesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub plot-palette-NotificationPreferences-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  BatchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub plot-palette-Batches-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: batch_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: batch_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      GlobalSecondaryIndexes:
        - IndexName: user-id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ============================================================
  # S3 Bucket
  # ============================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub plot-palette-data-${Environment}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['Content-Type', 'Authorization', 'x-amz-*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: !Ref AllowedOrigins
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldJobs
            Status: Enabled
            Prefix: jobs/
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
          - Id: IntelligentTieringSeedData
            Status: Enabled
            Prefix: seed-data/
            Transitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 30

  # ============================================================
  # API Gateway (HTTP API v2)
  # ============================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      DefaultRouteSettings:
        ThrottlingBurstLimit: 2000
        ThrottlingRateLimit: 1000
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            AuthorizationScopes:
              - openid
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}
              audience:
                - !Ref CognitoClientId

  # ============================================================
  # Lambda Functions - Jobs
  # ============================================================
  CreateJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-create-job-${Environment}
      CodeUri: lambdas/jobs/
      Handler: create_job.lambda_handler
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
        - Statement:
            - Effect: Allow
              Action:
                - states:StartExecution
              Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:plot-palette-*'
      Events:
        CreateJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs
            Method: POST

  ListJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-list-jobs-${Environment}
      CodeUri: lambdas/jobs/
      Handler: list_jobs.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        ListJobs:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs
            Method: GET

  GetJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-get-job-${Environment}
      CodeUri: lambdas/jobs/
      Handler: get_job.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        GetJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/{job_id}
            Method: GET

  DeleteJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-delete-job-${Environment}
      CodeUri: lambdas/jobs/
      Handler: delete_job.lambda_handler
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref QueueTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CostTrackingTable
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - ecs:StopTask
              Resource: !Sub 'arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task/plot-palette-*'
            - Effect: Allow
              Action:
                - states:StopExecution
              Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:plot-palette-*:*'
      Events:
        DeleteJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/{job_id}
            Method: DELETE

  DownloadJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-download-job-${Environment}
      CodeUri: lambdas/jobs/
      Handler: download_job.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
      Events:
        DownloadJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/{job_id}/download
            Method: GET

  DownloadPartialFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-download-partial-${Environment}
      CodeUri: lambdas/jobs/
      Handler: download_partial.lambda_handler
      MemorySize: 512
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Events:
        DownloadPartial:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/{job_id}/download-partial
            Method: GET

  # ============================================================
  # Lambda Functions - Templates
  # ============================================================
  CreateTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-create-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: create_template.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TemplatesTable
      Events:
        CreateTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates
            Method: POST

  ListTemplatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-list-templates-${Environment}
      CodeUri: lambdas/templates/
      Handler: list_templates.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
      Events:
        ListTemplates:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates
            Method: GET

  GetTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-get-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: get_template.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
      Events:
        GetTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}
            Method: GET

  UpdateTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-update-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: update_template.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TemplatesTable
      Events:
        UpdateTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}
            Method: PUT

  DeleteTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-delete-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: delete_template.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TemplatesTable
      Events:
        DeleteTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}
            Method: DELETE

  TestTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-test-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: test_template.lambda_handler
      Timeout: 30
      MemorySize: 512
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-*'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/meta.llama*'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/mistral.*'
      Events:
        TestTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}/test
            Method: POST

  ImportTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-import-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: import_template.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TemplatesTable
      Events:
        ImportTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/import
            Method: POST

  ExportTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-export-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: export_template.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
      Events:
        ExportTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}/export
            Method: GET

  ListTemplateVersionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-list-template-versions-${Environment}
      CodeUri: lambdas/templates/
      Handler: list_versions.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
      Events:
        ListTemplateVersions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}/versions
            Method: GET

  # ============================================================
  # Lambda Functions - Seed Data
  # ============================================================
  GenerateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-generate-upload-url-${Environment}
      CodeUri: lambdas/seed_data/
      Handler: generate_upload_url.lambda_handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Events:
        GenerateUploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /seed-data/upload
            Method: POST

  ValidateSeedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-validate-seed-data-${Environment}
      CodeUri: lambdas/seed_data/
      Handler: validate_seed_data.lambda_handler
      MemorySize: 512
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
      Events:
        ValidateSeedData:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /seed-data/validate
            Method: POST

  # ============================================================
  # Lambda Functions - Dashboard
  # ============================================================
  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-get-stats-${Environment}
      CodeUri: lambdas/dashboard/
      Handler: get_stats.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CostTrackingTable
      Events:
        GetStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /dashboard/{job_id}
            Method: GET

  # ============================================================
  # Lambda Functions - Cost Analytics (Phase 2)
  # ============================================================
  GetCostAnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-get-cost-analytics-${Environment}
      CodeUri: lambdas/dashboard/
      Handler: get_cost_analytics.lambda_handler
      MemorySize: 256
      Timeout: 15
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CostTrackingTable
      Events:
        GetCostAnalytics:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /dashboard/cost-analytics
            Method: GET

  # ============================================================
  # Lambda Functions - Marketplace (Phase 2)
  # ============================================================
  SearchTemplatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-search-templates-${Environment}
      CodeUri: lambdas/templates/
      Handler: search_templates.lambda_handler
      MemorySize: 256
      Timeout: 15
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
      Events:
        SearchTemplates:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/marketplace
            Method: GET

  ForkTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-fork-template-${Environment}
      CodeUri: lambdas/templates/
      Handler: fork_template.lambda_handler
      MemorySize: 256
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TemplatesTable
      Events:
        ForkTemplate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /templates/{template_id}/fork
            Method: POST

  # ============================================================
  # Lambda Functions - Settings (Phase 3)
  # ============================================================
  GetPreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-get-preferences-${Environment}
      CodeUri: lambdas/settings/
      Handler: get_preferences.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref NotificationPreferencesTable
      Events:
        GetPreferences:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /settings/notifications
            Method: GET

  UpdatePreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-update-preferences-${Environment}
      CodeUri: lambdas/settings/
      Handler: update_preferences.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationPreferencesTable
      Events:
        UpdatePreferences:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /settings/notifications
            Method: PUT

  # ============================================================
  # Lambda Functions - Notifications (Phase 3)
  # ============================================================
  SendNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-send-notification-${Environment}
      CodeUri: lambdas/notifications/
      Handler: send_notification.lambda_handler
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - DynamoDBReadPolicy:
            TableName: !Ref NotificationPreferencesTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'

  # ============================================================
  # Lambda Functions - SSE Streaming (Phase 3)
  # ============================================================
  StreamProgressFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-stream-progress-${Environment}
      CodeUri: lambdas/jobs/
      Handler: stream_progress.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        StreamProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/{job_id}/stream
            Method: GET

  # ============================================================
  # Lambda Functions - Batch Jobs (Phase 4)
  # ============================================================
  CreateBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-create-batch-${Environment}
      CodeUri: lambdas/jobs/
      Handler: create_batch.lambda_handler
      MemorySize: 512
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BatchesTable
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
        - Statement:
            - Effect: Allow
              Action:
                - states:StartExecution
              Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:plot-palette-*'
      Events:
        CreateBatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/batch
            Method: POST

  ListBatchesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-list-batches-${Environment}
      CodeUri: lambdas/jobs/
      Handler: list_batches.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BatchesTable
      Events:
        ListBatches:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/batches
            Method: GET

  GetBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-get-batch-${Environment}
      CodeUri: lambdas/jobs/
      Handler: get_batch.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BatchesTable
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        GetBatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/batches/{batch_id}
            Method: GET

  DeleteBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-delete-batch-${Environment}
      CodeUri: lambdas/jobs/
      Handler: delete_batch.lambda_handler
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BatchesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref QueueTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CostTrackingTable
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - states:StopExecution
              Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:plot-palette-*:*'
      Events:
        DeleteBatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /jobs/batches/{batch_id}
            Method: DELETE

  # ============================================================
  # Lambda Functions - Seed Data Generation (Phase 4)
  # ============================================================
  GenerateSeedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub plot-palette-generate-seed-data-${Environment}
      CodeUri: lambdas/seed_data/
      Handler: generate_seed_data.lambda_handler
      MemorySize: 512
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TemplatesTable
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-*'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/meta.llama*'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/mistral.*'
      Events:
        GenerateSeedData:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /seed-data/generate
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl

  Region:
    Description: AWS Region
    Value: !Ref AWS::Region

  DataBucketName:
    Description: S3 bucket for data storage
    Value: !Ref DataBucket
    Export:
      Name: !Sub ${AWS::StackName}-DataBucket

  JobsTableName:
    Description: DynamoDB Jobs table name
    Value: !Ref JobsTable

  TemplatesTableName:
    Description: DynamoDB Templates table name
    Value: !Ref TemplatesTable

  NotificationPreferencesTableName:
    Description: DynamoDB NotificationPreferences table name
    Value: !Ref NotificationPreferencesTable

  SendNotificationFunctionArn:
    Description: Send Notification Lambda function ARN
    Value: !GetAtt SendNotificationFunction.Arn

  BatchesTableName:
    Description: DynamoDB Batches table name
    Value: !Ref BatchesTable
