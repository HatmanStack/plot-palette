name: Documentation

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.cspell.json'
      - '.github/workflows/docs.yml'

jobs:
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23
        with:
          globs: '**/*.md #node_modules #.pytest_cache'

      - name: Spell check
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8
        with:
          files: '**/*.md'
          config: '.cspell.json'

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: '--no-progress --exclude-path node_modules --exclude-path .pytest_cache **/*.md'
          fail: true
