name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'tests/**'

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Security audit
        run: cd frontend && npm audit --audit-level=high --omit=dev

      - name: Test with coverage
        run: cd frontend && npm test -- --run --coverage

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Verify lockfile
        run: cd backend && uv lock --check

      - name: Install dependencies
        run: cd backend && uv pip install -e ".[dev,worker]" --system

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

      - name: Type check
        run: cd backend && mypy lambdas/ ecs_tasks/ --config-file pyproject.toml

      - name: Security scan
        run: bandit -r backend/ -ll -ii --exclude tests

      - name: CloudFormation lint
        run: cfn-lint backend/template.yaml

      - name: Test with coverage
        run: pytest tests/unit tests/integration -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=70

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, backend]
    if: needs.changes.outputs.backend == 'true'
    continue-on-error: true
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_ENDPOINT_URL: http://localhost:4566
      PYTHONPATH: ${{ github.workspace }}
    services:
      ministack:
        image: nahuelnucera/ministack
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,s3,iam
          PERSISTENCE: "0"
        options: --health-cmd "exit 0" --health-interval=2s --health-retries=5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Wait for ministack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_ministack/health > /dev/null 2>&1; then
              echo "ministack ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "ministack failed to start"
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: cd backend && uv pip install -e ".[dev,worker]" --system

      - name: Run E2E tests
        run: pytest tests/e2e -v --tb=short

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend, backend, e2e]
    if: always()
    steps:
      - name: Verify
        run: |
          # Frontend and backend are required gates
          for result in "${{ needs.frontend.result }}" "${{ needs.backend.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Required check failed: $result"
              exit 1
            fi
          done
          # E2E is advisory — flaky container infra should not block merges
          if [[ "${{ needs.e2e.result }}" != "success" && "${{ needs.e2e.result }}" != "skipped" ]]; then
            echo "::warning::E2E tests ${{ needs.e2e.result }} (advisory, not blocking)"
          fi
          echo "All required checks passed!"
